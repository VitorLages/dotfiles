# Bind reload to prefix R 
unbind r
bind r source-file ~/.tmux.conf

# Terminal colors
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Rebind prefix to control space
set -g prefix C-Space

set -g mouse on

set-window-option -g mode-keys vi

set -sg escape-time 5

# Bind Shift alt vim keys to switch windows
bind -n M-H previous-window
bind -n M-L next-window

# Index starts at 1
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Move around panes and neovim using Control - Vim keys
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

bind-key & kill-window
bind-key x kill-pane

# New binds to split window into panes
unbind -n '.'
unbind -n ';'
unbind '"'
unbind %
bind ";" split-window -h -c "#{pane_current_path}"
bind "." split-window -v -c "#{pane_current_path}"

# Tmux bar on top
set-option -g status-position top


set-option -g default-shell /usr/bin/fish
set-option -g default-command "fish -i"


# List of plugins
# set -g @plugin 'catppuccin/tmux#v2.1.0'
set -g @plugin 'TanglingTreats/tmux-everforest'
set -g @tmux-everforest 'dark-hard'
set -g @plugin 'niksingh710/minimal-tmux-status'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'jimeh/tmuxifier'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @minimal-tmux-fg "#000000"
set -g @minimal-tmux-bg "#A7C080"
set -g @minimal-tmux-status "top"
set -g @minimal-tmux-indicator true
set -g @minimal-tmux-justify "centre"

# Enables or disables the left and right status bar
set -g @minimal-tmux-right true
set -g @minimal-tmux-left true

# expanded icon (fullscreen icon)
# set -g @minimal-tmux-expanded-icon "󰊓 "

# on all tabs (default is false)
# false will make it visible for the current tab only
set -g @minimal-tmux-show-expanded-icons-for-all-tabs true

set -g pane-border-status off
set -g pane-active-border-style fg=default
set -g pane-border-format ''

set -g window-status-style bg=default,fg=default

# To add or remove extra text in status bar
set -g @minimal-tmux-status-left-extra ""
set -g @minimal-tmux-status-right-extra ""
# set -g @minimal-tmux-status-left-extra "#[fg=#cba6f7] #S #[fg=#7f849c]| #[fg=#f38ba8] #(basename \"#{pane_current_command}\") #[fg=#7f849c]| #[fg=#a6e3a1] #(basename \"#{pane_current_path}\")" 
# set -g @minimal-tmux-status-right-extra "#[fg=#a6e3a1] #{battery_percentage}% #[fg=#7f849c]| #[fg=#f38ba8] "%d-%m-%Y" #[fg=#7f849c]| #[fg=#cba6f7] "%H:%M""

#To make the selection box rounded () or edged <>
# Default is nothing, when set to true default is edged
set -g @minimal-tmux-use-arrow false

# Not recommended to change these values
set -g @minimal-tmux-status-right " "
set -g @minimal-tmux-status-left " "

set -g status-left-style bg=default
set -g status-right-style bg=default

# If getting strings cut in left status or right
# Here 20 is the length of the characters in the string
set -g status-right-length 0
set -g status-left-length 0


